<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Christian's Music Library</title>
</head>
<body>
    <div class="navbar">
        <ul>
            <li id="Current"><a href="index.html">Home</a></li>
            <li><a href="artists.html">Artists</a></li>
            <li><a href="formats.html">Formats</a></li>
            <li><a href="stores.html">Stores</a></li>
        </ul>
    </div>

    <main>
        <div class="slideshow-container">
            <a class="prev" onclick="plusSlides(-1)">❮</a>
            <a class="next" onclick="plusSlides(1)">❯</a>

            <div class="banners">
                <div class="mySlides">
                    <div class="radioheadBanner">
                        <div class="container">
                            <div class="bandImage">
                                <img src="Images/radiohead cover.png">
                            </div>
                            <div class="bandDescription">
                                <h1>Radiohead</h1>
                                <p>Text</p>
                            </div>
                        </div>
                    </div>
                </div>
            
                <div class="mySlides">
                    <div class="coldplayBanner">
                        <div class="container">
                            <div class="bandImage">
                                <img src="Images/coldplay.png">
                            </div>
                            <div class="bandDescription">
                                <h1>Coldplay</h1>
                                <p>Coldplay so epic</p>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="mySlides">
                    <div class="queenBanner">
                        <div class="container">
                            <div class="bandImage">
                                <img src="Images/queen.png">
                            </div>
                            <div class="bandDescription">
                                <h1>Queen</h1>
                                <p>Queen is cool</p>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="mySlides">
                    <div class="queenBanner">
                        <div class="container">
                            <div class="bandImage">
                                <img src="Images/beatles.png">
                            </div>
                            <div class="bandDescription">
                                <h1>Beatles</h1>
                                <p>Beatles are cool</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <hr>
            <div class=""></div>
    </main>


    
    <script>
        let slideIndex = 1;
        showSlides(slideIndex);
        
        function plusSlides(n) {
          showSlides(slideIndex += n);
        }
        
        function currentSlide(n) {
          showSlides(slideIndex = n);
        }
        
        function showSlides(n) {
            let i;
            let slides = document.getElementsByClassName("mySlides");

            if (n > slides.length) {slideIndex = 1}    
            if (n < 1) {slideIndex = slides.length}

            for (i = 0; i < slides.length; i++) {
                slides[i].style.display = "none";  
            }

            slides[slideIndex-1].style.display = "block";  
}
        </script>
</body>
</html>
